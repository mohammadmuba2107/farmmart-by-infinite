<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>FarmMart</title>

    <link rel="stylesheet"
    href="style.css">

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar">

        <h1>
            🌾 FarmMart
        </h1>

        <div class="nav-links">

            <a href="index.html">
                Home
            </a>

            <a href="cart.html">
                Cart
            </a>

            <a href="seller.html">
                Seller
            </a>

            <a href="tracking.html">
                Tracking
            </a>

            <a href="login.html">
                Login
            </a>

        </div>

    </nav>


    <!-- HERO SECTION -->

    <section class="hero">

        <h1 id="main-heading">
            Fresh Products From Farmers 🌱
        </h1>

        <p>
            Direct Farmer To Customer Marketplace
        </p>

        <button onclick="switchLanguage()">
            🌐 Hindi / English
        </button>

    </section>


    <!-- SEARCH -->

    <div class="search-box">

        <input
        type="text"
        id="search"
        placeholder="Search products..."
        onkeyup="searchProduct()"
        >

        <button onclick="startVoiceSearch()">
            🎤 Voice Search
        </button>

    </div>


    <!-- PRODUCTS -->

    <div id="products"
    class="products-container">

    </div>


    <!-- FEATURES -->

    <section class="features">

        <div class="feature-card">
            🤖 AI Price Comparison
        </div>

        <div class="feature-card">
            🚚 Live Order Tracking
        </div>

        <div class="feature-card">
            🛒 Smart Cart System
        </div>

        <div class="feature-card">
            🌐 Multi Language Support
        </div>

    </section>


    <!-- FOOTER -->

    <footer>

        <h3>
            FarmMart By Infinite 🚀
        </h3>

        <p>
            Hackathon Project
        </p>

    </footer>


    <script src="script.js"></script>

</body>
</html>
